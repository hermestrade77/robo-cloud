<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROBO IA XAU/USD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0f1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            max-width: 700px;
            margin: auto;
        }
        h1 {
            text-align: center;
            color: #ffaa00;
            margin-bottom: 20px;
        }
        .card {
            background: #131a2b;
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        .signal {
            font-size: 2.5rem;
            font-weight: bold;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .label { color: #aaa; font-size: 0.9rem; }
        .value { font-size: 1.2rem; font-weight: bold; }
        .positive { color: #00ff99; }
        .negative { color: #ff4444; }
        .neutral { color: #ffaa00; }
        hr { border-color: #222; margin: 15px 0; }
        pre {
            background: #0a0f1a;
            padding: 10px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-size: 0.9rem;
        }
        .timestamp {
            text-align: right;
            font-size: 0.8rem;
            color: #666;
        }
    </style>
</head>
<body>

    <h1>🔥 ROBO IA XAU/USD</h1>

    <div class="card">
        <div class="row">
            <span class="label">💰 PREÇO</span>
            <span class="value" id="price">0</span>
        </div>
        <div class="row">
            <span class="label">📊 MARKET</span>
            <span class="value" id="market">NONE</span>
        </div>
        <div class="row">
            <span class="label">📉 ATR</span>
            <span class="value" id="atr">0</span>
        </div>
        <div class="row">
            <span class="label">📡 SPREAD</span>
            <span class="value" id="spread">0</span>
        </div>
        <div class="row">
            <span class="label">📰 NEWS</span>
            <span class="value" id="news">NONE</span>
        </div>
        <div class="row">
            <span class="label">⏰ SESSION</span>
            <span class="value" id="session">NONE</span>
        </div>
    </div>

    <div class="card" id="signal-card">
        <div class="signal" id="signal-text">WAIT</div>
        <div class="row">
            <span class="label">🎯 CONFIDENCE</span>
            <span class="value" id="confidence">0%</span>
        </div>
        <div class="row">
            <span class="label">🚀 BUY SCORE</span>
            <span class="value" id="buy_score">0</span>
        </div>
        <div class="row">
            <span class="label">🔻 SELL SCORE</span>
            <span class="value" id="sell_score">0</span>
        </div>
    </div>

    <div class="card">
        <h2>🧠 MOTIVO DA ENTRADA</h2>
        <pre id="reason">AGUARDANDO IA...</pre>
    </div>

    <div class="card">
        <h2>🤖 IA ANALISANDO</h2>
        <pre id="analysis">AGUARDANDO DADOS...</pre>
    </div>

    <div class="card">
        <h2>📈 PERFORMANCE</h2>
        <div class="row">
            <span class="label">WINRATE</span>
            <span class="value" id="winrate">0%</span>
        </div>
        <div class="row">
            <span class="label">TRADES</span>
            <span class="value" id="trades">0</span>
        </div>
        <div class="row">
            <span class="label">PNL</span>
            <span class="value" id="pnl">0</span>
        </div>
    </div>

    <div class="timestamp" id="timestamp">NONE</div>

    <script>
        async function fetchData() {
            try {
                const res = await fetch('/data');
                const data = await res.json();

                // Atualizar todos os campos
                document.getElementById('price').textContent = data.price || 0;
                document.getElementById('market').textContent = data.market || 'NONE';
                document.getElementById('atr').textContent = data.atr || 0;
                document.getElementById('spread').textContent = data.spread || 0;
                document.getElementById('news').textContent = data.news || 'NONE';
                document.getElementById('session').textContent = data.session || 'NONE';
                document.getElementById('confidence').textContent = (data.confidence || 0) + '%';
                document.getElementById('buy_score').textContent = data.buy_score || 0;
                document.getElementById('sell_score').textContent = data.sell_score || 0;
                document.getElementById('reason').textContent = data.reason || 'AGUARDANDO IA...';
                document.getElementById('analysis').textContent = data.analysis || 'AGUARDANDO DADOS...';
                document.getElementById('winrate').textContent = (data.winrate || 0) + '%';
                document.getElementById('trades').textContent = data.trades || 0;
                document.getElementById('pnl').textContent = data.pnl || 0;
                document.getElementById('timestamp').textContent = data.timestamp || 'NONE';

                // Sinal com cor dinâmica
                const signal = data.signal || 'WAIT';
                const signalEl = document.getElementById('signal-text');
                signalEl.textContent = signal;
                if (signal === 'BUY') {
                    signalEl.style.color = '#00ff99';
                } else if (signal === 'SELL') {
                    signalEl.style.color = '#ff4444';
                } else {
                    signalEl.style.color = '#ffaa00';
                }
            } catch (err) {
                console.error('Erro ao buscar dados:', err);
            }
        }

        // Atualiza a cada 2 segundos
        setInterval(fetchData, 2000);
        fetchData(); // primeira chamada imediata
    </script>
</body>
</html>
